name: Build PRX

on:
  push:
    branches: [main]
    tags:    ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up clang + lld (pre-installed on runner)
        run: |
          # ubuntu-22.04 runner has clang-14/15 pre-installed
          CLANG_BIN=$(ls /usr/bin/clang-1[3-9] 2>/dev/null | sort -V | tail -1)
          LLD_BIN=$(ls /usr/bin/ld.lld-1[3-9] 2>/dev/null | sort -V | tail -1)
          if [ -z "$CLANG_BIN" ] || [ -z "$LLD_BIN" ]; then
            echo "clang/lld not pre-installed, falling back to apt"
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends clang-15 lld-15
            CLANG_BIN=/usr/bin/clang-15
            LLD_BIN=/usr/bin/ld.lld-15
          fi
          sudo ln -sf "$CLANG_BIN" /usr/local/bin/clang
          sudo ln -sf "$LLD_BIN"   /usr/local/bin/ld.lld
          clang --version
          ld.lld --version

      - name: Cache OpenOrbis SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/OpenOrbis
          key: openorbis-v0.5.4-strip1

      - name: Download OpenOrbis SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/OpenOrbis
          curl -L https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz \
            -o /tmp/oo.tar.gz
          sudo tar -xzf /tmp/oo.tar.gz --strip-components=1 -C /opt/OpenOrbis
          sudo chmod +x /opt/OpenOrbis/PS4Toolchain/bin/linux/* || true

      - name: Run host tests
        run: make test

      - name: Build PRX
        env:
          OO_PS4_TOOLCHAIN: /opt/OpenOrbis/PS4Toolchain
        run: make prx

      - name: Upload PRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps4-mqtt-prx
          path: |
            build/ps4-mqtt.prx
            build/ps4-mqtt.elf
            config.example.json
            README.md
          if-no-files-found: error
          retention-days: 30

      - name: Compute version (auto on main, tag-driven on tag push)
        id: version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAG="$VERSION"
          else
            VERSION="v0.1.${GITHUB_RUN_NUMBER}"
            TAG="$VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Releasing as $VERSION (tag $TAG)"

      - name: Create release on main push or tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       ${{ steps.version.outputs.version }}
          body: |
            Auto-built PRX from commit ${{ github.sha }}.

            **Install:**
            1. Download `ps4-mqtt.prx` and `config.example.json`
            2. Edit config with your broker host/credentials
            3. FTP both to `/data/GoldHEN/plugins/ps4-mqtt/` on the PS4
            4. Add `ps4-mqtt=/data/GoldHEN/plugins/ps4-mqtt/ps4-mqtt.prx` to `/data/GoldHEN/plugins.ini`
            5. Reboot the PS4
          files: |
            build/ps4-mqtt.prx
            build/ps4-mqtt.elf
            config.example.json
          fail_on_unmatched_files: true
          make_latest: true
