name: Build PRX

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 15 + lld
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-15 lld-15 llvm-15 make
          sudo ln -sf /usr/bin/clang-15   /usr/local/bin/clang
          sudo ln -sf /usr/bin/ld.lld-15  /usr/local/bin/ld.lld

      - name: Cache OpenOrbis SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/OpenOrbis
          key: openorbis-v0.5.4-strip1

      - name: Download OpenOrbis SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/OpenOrbis
          curl -L https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz \
            -o /tmp/oo.tar.gz
          sudo tar -xzf /tmp/oo.tar.gz --strip-components=1 -C /opt/OpenOrbis
          sudo chmod +x /opt/OpenOrbis/PS4Toolchain/bin/linux/* || true

      - name: Run host tests
        run: make test

      - name: Build PRX
        env:
          OO_PS4_TOOLCHAIN: /opt/OpenOrbis/PS4Toolchain
        run: make prx

      - name: Upload PRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps4-mqtt-prx
          path: |
            build/ps4-mqtt.prx
            build/ps4-mqtt.elf
            config.example.json
            README.md
          if-no-files-found: error
          retention-days: 30

      - name: Upload to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/ps4-mqtt.prx
            build/ps4-mqtt.elf
            config.example.json
